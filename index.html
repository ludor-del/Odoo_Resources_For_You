<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo Resource Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --odoo-purple: #714B67;
            --odoo-teal: #017E84;
            --odoo-light-teal: #00A09D;
            --youtube-black: #0F0F0F;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* --- UPDATED BACKGROUND PROPERTIES --- */
            background-color: #0c0d12; /* A dark color from the image to prevent a white flash */
            background-image: url('https://replicate.delivery/xpbkg/jY1yP6O6jR1N1gA9fD9Qe9H8X9v3U9Z5Y9o1T2I3L5e6F3G4A/output.png');
            background-size: cover; /* Ensures the image covers the entire screen */
            background-position: center; /* Centers the chalkboard */
            background-repeat: no-repeat; /* Prevents the image from tiling */
            background-attachment: fixed; /* Optional: Keeps the background static if you scroll */
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px; /* Slightly increased gap for better layout against the flowchart */
            width: 100%;
            max-width: 300px;
            min-width: 260px;
            padding: 20px;
            
            /* Added a subtle backdrop blur and dark background to help the text contrast */
            background-color: rgba(12, 13, 18, 0.7); 
            border-radius: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 24px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            text-align: center;
        }

        .btn span { margin-right: 12px; font-size: 1.2rem; }
        
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Colors & Specialized Animations */
        .btn-book { 
            background-color: var(--odoo-purple); 
            animation: pulse 2s infinite; 
        }
        .btn-docs { background-color: var(--odoo-teal); }
        .btn-learning { background-color: var(--odoo-light-teal); }
        .btn-youtube { background-color: var(--youtube-black); border: 1px solid rgba(255,255,255,0.2); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(113, 75, 103, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(113, 75, 103, 0); }
            100% { box-shadow: 0 0 0 0 rgba(113, 75, 103, 0); }
        }
    </style>
</head>
<body>

    <div class="button-container">
        <a href="https://www.odoo.com/book/194b2564" class="btn btn-book" target="_blank">
            <span>📅</span> Book a Meeting
        </a>

        <a href="https://www.odoo.com/documentation/19.0/index.html" class="btn btn-docs" target="_blank">
            <span>📚</span> Documentation
        </a>

        <a href="https://www.odoo.com/slides" class="btn btn-learning" target="_blank">
            <span>🎓</span> Odoo Learning
        </a>

        <a href="https://www.youtube.com/@Odoo" class="btn btn-youtube" target="_blank">
            <span>▶</span> Odoo YouTube
        </a>
    </div>

</body>
</html>
